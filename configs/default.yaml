# ============================================================
# Default configuration for CA-APSRG retinal vessel segmentation
# ============================================================
# Notes:
# - Keep original datasets unchanged under data/raw.
# - Use data/working_png as the standardized PNG working dataset.
# - Binary masks must be saved as 0/255 PNG files.
# - APSRG is used as the baseline.
# - CA-APSRG will refine APSRG output using context-aware adaptive morphology.

project:
  name: "ca_apsrg_retinal_project"
  description: "Context-Aware APSRG with Adaptive Morphological Refinement for retinal blood vessel segmentation"
  random_seed: 42

# Main path configuration
paths:
  raw_root: "data/raw/Retinal Vessel"
  working_png_root: "data/working_png"
  manifest_path: "data/manifests/manifest.csv"
  output_root: "outputs"
  reports_dir: "outputs/reports"
  experiments_dir: "outputs/experiments"
  single_test_dir: "outputs/single_test"

# Backward-compatible path configuration
data:
  raw_root: "data/raw/Retinal Vessel"
  working_png_root: "data/working_png"
  manifest_path: "data/manifests/manifest.csv"

# Backward-compatible experiment configuration
experiment:
  output_dir: "outputs/experiments"
  reports_dir: "outputs/reports"
  single_test_dir: "outputs/single_test"
  always_refine: true
  false_positive_precision_threshold: 0.95

conversion:
  convertible_extensions:
    - ".ppm"
    - ".jpg"
    - ".jpeg"
    - ".tif"
    - ".tiff"
    - ".gif"
    - ".bmp"

  copy_existing_png: true

  skip_archive_extensions:
    - ".zip"
    - ".7z"
    - ".rar"
    - ".tar"
    - ".gz"

  preserve_relative_structure: true
  binarize_masks: true
  binary_threshold: 127
  png_compress_level: 3
  report_csv: "outputs/reports/png_conversion_report.csv"

  mask_name_keywords:
    - "mask"
    - "manual"
    - "label"
    - "groundtruth"
    - "ground_truth"
    - "gt"
    - "1stho"
    - "2ndho"
    - "fov"

manifest:
  datasets:
    - "DRIVE"
    - "STARE"
    - "CHASEDB1"

  require_ground_truth: true
  include_fov_mask_if_available: true

  # STARE has two observers commonly named ah and vk.
  stare_observer: "ah"

  # CHASEDB1 has two observers: 1stHO and 2ndHO.
  chasedb1_observer: "1stHO"

preprocessing:
  use_green_channel: true
  normalize_intensity: true

  apply_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: [8, 8]

  denoise_method: "median"   # options: none, median, bilateral
  median_kernel_size: 3

  bilateral_d: 5
  bilateral_sigma_color: 50
  bilateral_sigma_space: 50

  apply_fov_mask: true

apsrg_baseline:
  # APSRG-style baseline parameters.
  # These parameters are initial experimental values and can be tuned after
  # observing results on DRIVE first.

  vessel_enhancement_method: "blackhat_multiscale"
  vesselness_kernel_sizes: [7, 11, 15]

  # options: percentile, polling, percentile_polling
  seed_selection_method: "percentile_polling"

  # Higher seed percentile means fewer but stronger seed pixels.
  seed_percentile: 92

  # Candidate percentile should be lower than seed percentile.
  candidate_percentile: 78

  # Local polling helps distribute seed points across retinal regions.
  polling_window_size: 16
  polling_top_percentile: 97
  min_seed_distance: 2

  # Region growing parameters.
  region_growing_connectivity: 8
  max_intensity_difference: 18
  max_iterations: 500000

  # Light APSRG post-processing.
  min_component_area: 8
  fill_small_holes_area: 8

false_positive_analysis:
  enabled: true
  precision_threshold: 0.95
  small_component_area: 12
  high_small_component_ratio: 0.35

context_features:
  enabled: true
  compute_vessel_density: true
  compute_connected_components: true
  compute_small_component_ratio: true
  compute_component_area_statistics: true
  small_component_area: 12

ca_apsrg:
  enabled: true
  always_refine: true

  low_density_threshold: 0.025
  high_density_threshold: 0.120

  target_preserve_thin_vessels: true

adaptive_morphology:
  enabled: true

  remove_small_objects: true
  fill_small_holes: false
  closing_enabled: false
  opening_enabled: false
  skeleton_guard_enabled: false

  small_component_area_low_density: 8
  small_component_area_normal: 18
  small_component_area_high_density: 28

  hole_area_low_density: 4
  hole_area_normal: 8
  hole_area_high_density: 12

  closing_kernel_low_density: 0
  closing_kernel_normal: 0
  closing_kernel_high_density: 0

  opening_kernel_low_density: 0
  opening_kernel_normal: 0
  opening_kernel_high_density: 0

  skeleton_restore_radius: 1
  skeleton_min_component_length: 6

evaluation:
  binary_threshold: 127
  evaluate_inside_fov_only: true

  positive_label: 255
  negative_label: 0

  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "specificity"
    - "f1_score"
    - "iou"

outputs:
  save_preprocessed: true
  save_apsrg_mask: true
  save_ca_apsrg_mask: true
  save_overlay: true
  save_metrics_per_image: true
  save_metrics_summary: true

  overlay_alpha: 0.45
  metrics_per_image_csv: "outputs/experiments/metrics_per_image.csv"
  metrics_summary_csv: "outputs/experiments/metrics_summary.csv"

visualization:
  dpi: 150
  show_titles: true
  save_side_by_side: true